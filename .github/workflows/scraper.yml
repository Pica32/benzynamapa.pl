name: Scraper – ceny paliw PL

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00 CET
    - cron: '0 8 * * *'   # 10:00 CET
    - cron: '0 13 * * *'  # 15:00 CET
  workflow_dispatch:

permissions:
  contents: write   # potřeba pro git push

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/build_osm_data.py
        env:
          # Komunitní ceny (hlášení uživatelů) — viz SUPABASE_SETUP.md.
          # Nastav v repo: Settings → Secrets and variables → Actions.
          # Bez nich scraper běží normálně, jen vynechá komunitní vrstvu.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          git add scraper/history_pl.json || true
          git add scraper/gps_cache_pl.json || true
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "→ Žádné změny v datech, commit přeskočen"
          else
            git commit -m "data: aktualizacja cen paliw $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # IndexNow: po každé změně cen pinguje Bing/Yandex/Seznam/Naver, aby okamžitě
      # přecrawlovali. Bing zásobuje ChatGPT a Copilot — kritické pro AI viditelnost.
      - name: Ping IndexNow (Bing, Yandex, Seznam, Naver)
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        run: python scraper/indexnow_ping.py
